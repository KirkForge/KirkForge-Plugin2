name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check / Test / Lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            test: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            test: false
          - os: macos-latest
            target: aarch64-apple-darwin
            test: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Format check
        if: matrix.test
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked --target ${{ matrix.target }}

      - name: Build
        run: cargo build --workspace --locked --profile ci --target ${{ matrix.target }}

      - name: Test
        if: matrix.test
        run: cargo test --workspace --locked --all-features --target ${{ matrix.target }}

      - name: Docs
        if: matrix.test
        run: cargo doc --workspace --no-deps --all-features --target ${{ matrix.target }}
        env:
          RUSTDOCFLAGS: -D warnings

  deny:
    name: License / Advisory
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.18.4 --locked

      - name: Cargo deny check
        run: cargo deny check
