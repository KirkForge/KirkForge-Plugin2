name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked

      - name: Test
        run: cargo test --workspace --locked --all-features

      - name: Cargo deny check
        run: |
          cargo install cargo-deny --version 0.19.9 --locked
          cargo deny check

  publish:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Publish kirkstratum-core
        run: cargo publish -p kirkstratum-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for kirkstratum-core on crates.io
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for i in $(seq 1 60); do
            if cargo search kirkstratum-core --limit 1 2>/dev/null | grep -q "kirkstratum-core = \"$VERSION\""; then
              echo "kirkstratum-core $VERSION is available"
              exit 0
            fi
            echo "waiting for kirkstratum-core $VERSION on crates.io ($i/60)"
            sleep 10
          done
          echo "timeout waiting for kirkstratum-core"
          exit 1

      - name: Publish kirkstratum-hosts
        run: cargo publish -p kirkstratum-hosts --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for kirkstratum-hosts on crates.io
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for i in $(seq 1 60); do
            if cargo search kirkstratum-hosts --limit 1 2>/dev/null | grep -q "kirkstratum-hosts = \"$VERSION\""; then
              echo "kirkstratum-hosts $VERSION is available"
              exit 0
            fi
            echo "waiting for kirkstratum-hosts $VERSION on crates.io ($i/60)"
            sleep 10
          done
          echo "timeout waiting for kirkstratum-hosts"
          exit 1

      - name: Publish kirkstratum-cli
        run: cargo publish -p kirkstratum-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  binaries:
    name: Build release binaries
    needs: test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            suffix: linux-aarch64-musl
          - target: x86_64-apple-darwin
            os: macos-13
            suffix: macos-intel
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
          cat >> $GITHUB_ENV <<EOF
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc
          RUSTFLAGS=-D warnings -C target-feature=+crt-static
          EOF

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --bin stratum --release --locked --target ${{ matrix.target }}

      - name: Strip and package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/stratum dist/stratum-${{ matrix.suffix }}
          cd dist
          sha256sum stratum-${{ matrix.suffix }} > stratum-${{ matrix.suffix }}.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: stratum-${{ matrix.suffix }}
          path: dist/*

  sbom:
    name: Generate SBOM
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-sbom
        run: cargo install cargo-sbom --locked

      - name: Generate SBOM
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cargo sbom > stratum-$VERSION.sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: '*.sbom.json'

  sign:
    name: Sign binaries
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: stratum-*

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binaries with Sigstore
        run: |
          mkdir -p sig
          find dist -type f ! -name '*.sha256' -print0 | while IFS= read -r -d '' f; do
            cosign sign-blob "$f" --yes --output-signature "sig/$(basename "$f").sig"
          done

      - name: Upload signature artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signatures
          path: sig/*

  release:
    name: Create GitHub Release
    needs: [binaries, sbom, sign]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: '*'

      - name: Build SHA256SUMS
        run: |
          mkdir -p final
          find release-assets -type f ! -name '*.sha256' -exec cp {} final/ \;
          cd final
          sha256sum * > ../SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            final/*
            SHA256SUMS
          generate_release_notes: true
